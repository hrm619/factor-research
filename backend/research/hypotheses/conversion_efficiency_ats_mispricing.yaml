hypothesis_name: conversion_efficiency_ats_mispricing
description: >
  Teams with elite third-down conversion rates (top quartile, season-to-date)
  cover the spread at a higher rate than teams with poor conversion rates
  (bottom quartile), suggesting the market undervalues conversion efficiency
  relative to volume stats like total yards.
version: "1.0.0"
metrics:
  - third_down_rate_std
  - yards_per_game_std
classification:
  type: quartile
  metric: third_down_rate_std
outcome: ats
filters:
  seasons: [2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]
  game_type: [regular]
  exclude_week_1: true
lookback: season_to_date
time_windows:
  - label: "2014-2018"
    seasons: [2014, 2015, 2016, 2017, 2018]
  - label: "2019-2021"
    seasons: [2019, 2020, 2021]
  - label: "2022-2024"
    seasons: [2022, 2023, 2024]
min_sample_size: 50
statistical_test: binomial
significance_threshold: 0.05
comparison_buckets: [Q1, Q4]
output_breakdowns:
  - by_season
  - by_home_away
