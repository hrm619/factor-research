hypothesis_name: defensive_efficiency_compound
description: >
  Teams with elite defense (top quartile points allowed) AND mediocre offense
  (middle two quartiles points scored) cover at higher rates than elite offense /
  mediocre defense teams. Isolates the pricing asymmetry between offense and defense.
version: "1.0.0"
metrics:
  - points_allowed_per_game_std
  - points_per_game_std
classification:
  type: quartile
  metric: points_allowed_per_game_std
outcome: ats
filters:
  seasons: [2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]
  game_type: [regular]
  exclude_week_1: true
lookback: season_to_date
time_windows:
  - label: "2014-2018"
    seasons: [2014, 2015, 2016, 2017, 2018]
  - label: "2019-2021"
    seasons: [2019, 2020, 2021]
  - label: "2022-2024"
    seasons: [2022, 2023, 2024]
min_sample_size: 50
statistical_test: chi_squared
significance_threshold: 0.05
comparison_buckets: [Q1, Q4]
